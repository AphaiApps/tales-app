<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Tales</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --card-white: #ffffff; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; color: var(--primary); overflow: hidden; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px; flex: 1; text-align: center; overflow-y: auto; }
        .active { display: flex; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; z-index: 10; }
        button { padding: 18px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%; -webkit-tap-highlight-color: transparent; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: var(--accent); color: white; }
        .btn-back { background: none; border: 1px solid var(--primary); color: var(--primary); width: auto; padding: 10px 20px; margin-bottom: 20px; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; padding: 8px; font-size: 0.8rem; border-radius: 8px; width: auto; }
        .card { background: var(--card-white); border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; text-align: center; margin-top: 20px; }
        .gallery-wrapper { width: 100vw; overflow-x: scroll; display: flex; scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding: 20px 0; }
        .gallery-item { flex: 0 0 80vw; margin: 0 10vw; scroll-snap-align: center; display: flex; flex-direction: column; align-items: center; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box; background: white; }
        .q-list-item { background: white; padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; text-align: left; width: 100%; max-width: 400px; font-size: 0.9rem; border: 1px solid #eee; }
    </style>
</head>
<body>

<div id="app" style="height: 100%; display: flex; flex-direction: column;">
    <div id="home-screen" class="screen active">
        <h1 style="margin-top:40px;">Family Tales</h1>
        <div class="btn-group">
            <button class="btn-main" onclick="openSubMenu('Kids')">👧 Evelynn (Kids)</button>
            <button class="btn-main" onclick="openSubMenu('Couples')">👩‍❤️‍👨 Samantha (Couples)</button>
            <button class="btn-main" onclick="openSubMenu('Parents')">👴 Mom & Dad</button>
            <button id="admin-trigger" style="background:#bdc3c7; color:white; font-size: 0.8rem; margin-top: 40px; padding: 10px;" onclick="showScreen('admin-screen')">⚙️ Manage App</button>
        </div>
    </div>

    <div id="sub-menu" class="screen">
        <button class="btn-back" onclick="showScreen('home-screen')">← Back</button>
        <h2 id="sub-title">Category</h2>
        <div class="btn-group">
            <button class="btn-sub" onclick="startNewQuestions()">✨ New Questions</button>
            <button class="btn-main" onclick="viewAnswered()">📚 Past Questions</button>
        </div>
    </div>

    <div id="new-question-screen" class="screen">
        <button class="btn-back" onclick="showScreen('sub-menu')">← Back</button>
        <div class="card" onclick="drawQuestion()">
            <h2 id="q-text">Tap to Draw</h2>
        </div>
        <button id="done-btn" class="btn-sub" style="margin-top:20px; background:#27ae60; display:none;" onclick="markDone()">✅ Mark Answered</button>
        <p id="q-count" style="margin-top:10px; opacity:0.6;"></p>
    </div>

    <div id="answered-screen" class="screen">
        <button class="btn-back" onclick="showScreen('sub-menu')">← Back</button>
        <h2>Past Memories</h2>
        <div id="gallery" class="gallery-wrapper"></div>
    </div>

    <div id="admin-screen" class="screen">
        <button class="btn-back" onclick="showScreen('home-screen')">← Back</button>
        <h2>Add Question</h2>
        <div class="btn-group">
            <input type="text" id="new-q-text" placeholder="Type your question here...">
            <select id="new-q-cat">
                <option value="Kids">Evelynn (Kids)</option>
                <option value="Couples">Samantha (Couples)</option>
                <option value="Parents">Mom & Dad</option>
            </select>
            <button class="btn-sub" onclick="addQuestion()">➕ Save Question</button>
        </div>
        <hr style="width:100%; margin: 20px 0;">
        <h2>Manage Current</h2>
        <div id="admin-q-list" style="width:100%;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCzR4mmI3TwYmRUShfQQnqjfVbww6lbp_E",
      authDomain: "talessync-3427b.firebaseapp.com",
      projectId: "talessync-3427b",
      storageBucket: "talessync-3427b.firebasestorage.app",
      messagingSenderId: "665087372237",
      appId: "1:665087372237:web:7dfb6a733ca96b6e23f284",
      measurementId: "G-1S2CXQ1RVE"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allQuestions = [];
    let answeredIds = [];
    let activeCat = '';
    let currentQ = null;

    // DATA LOADING
    db.ref('answered').on('value', s => { answeredIds = s.val() || []; });
    db.ref('questions').on('value', s => {
        const data = s.val();
        allQuestions = data ? Object.keys(data).map(key => ({...data[key], firebaseKey: key})) : [];
        if(allQuestions.length === 0) {
            console.log("Database empty. Seeding...");
            seedDatabase();
        }
        renderAdminList();
    }, e => {
        alert("Firebase Error: " + e.message);
    });

    function seedDatabase() {
        const initial = [
            { id: 1, cat: 'Kids', text: "If Leeloo could talk, what would her voice sound like?" },
            { id: 2, cat: 'Kids', text: "What makes you feel really brave, even when you're scared?" },
            { id: 3, cat: 'Kids', text: "If you could make one rule everyone had to follow, what is it?" },
            { id: 4, cat: 'Kids', text: "What's the best surprise you've ever had?" },
            { id: 5, cat: 'Kids', text: "If you were the parent for a day, what would you make me do?" },
            { id: 6, cat: 'Kids', text: "What is the kindest thing you saw someone do today?" },
            { id: 7, cat: 'Kids', text: "If we could only eat one color of food all day, what color?" },
            { id: 8, cat: 'Kids', text: "What is your favorite thing about yourself?" },
            { id: 9, cat: 'Kids', text: "If you could build a secret room in our house, where?" },
            { id: 10, cat: 'Kids', text: "What do you want to be famous for one day?" },
            { id: 11, cat: 'Kids', text: "If you could talk to animals, which one first?" },
            { id: 12, cat: 'Kids', text: "What's the funniest thing that happened at school this week?" },
            { id: 13, cat: 'Kids', text: "If you could fly, where is the first place you'd go?" },
            { id: 14, cat: 'Kids', text: "Tell me about a dream you had recently." },
            { id: 15, cat: 'Kids', text: "What makes our family special?" },
            { id: 16, cat: 'Couples', text: "What is a 'little thing' I do that you really love?" },
            { id: 17, cat: 'Couples', text: "When do you feel most 'at home' or safe with me?" },
            { id: 18, cat: 'Couples', text: "If we took 24 hours off from 'adulting', what would we do?" },
            { id: 19, cat: 'Couples', text: "What memory of us always makes you laugh?" },
            { id: 20, cat: 'Couples', text: "What's one dream you've put off that I can help with?" },
            { id: 21, cat: 'Couples', text: "If we were in a movie, what genre would it be?" },
            { id: 22, cat: 'Couples', text: "What is our biggest strength as a team?" },
            { id: 23, cat: 'Couples', text: "What was your actual first impression of me?" },
            { id: 24, cat: 'Couples', text: "If we won the lottery today, what's the first purchase?" },
            { id: 25, cat: 'Couples', text: "What are you most proud of in our life together?" },
            { id: 26, cat: 'Couples', text: "What is your favorite way to spend a rainy day?" },
            { id: 27, cat: 'Couples', text: "If we lived anywhere for one year, where?" },
            { id: 28, cat: 'Couples', text: "What's a new tradition you want to start?" },
            { id: 29, cat: 'Couples', text: "What's the best advice we've ever received?" },
            { id: 30, cat: 'Couples', text: "What are you most excited for in our future?" },
            { id: 31, cat: 'Parents', text: "What was your first car and a crazy story about it?" },
            { id: 32, cat: 'Parents', text: "What food did you eat as a kid that you now realize was weird?" },
            { id: 33, cat: 'Parents', text: "What was the hardest decision you ever made?" },
            { id: 34, cat: 'Parents', text: "What should Evelynn know about our family history?" },
            { id: 35, cat: 'Parents', text: "What was your favorite song to dance to in high school?" },
            { id: 36, cat: 'Parents', text: "What lesson from your parents do you still use?" },
            { id: 37, cat: 'Parents', text: "Who was your best friend growing up?" },
            { id: 38, cat: 'Parents', text: "What was your very first job?" },
            { id: 39, cat: 'Parents', text: "What historical event do you remember most clearly?" },
            { id: 40, cat: 'Parents', text: "What's the best trip you've ever taken?" },
            { id: 41, cat: 'Parents', text: "What's a hobby you've always wanted to try?" },
            { id: 42, cat: 'Parents', text: "What's your favorite memory of me as a kid?" },
            { id: 43, cat: 'Parents', text: "What's the most important thing you've learned about life?" },
            { id: 44, cat: 'Parents', text: "What's a dream you still have for yourself?" },
            { id: 45, cat: 'Parents', text: "What is the one thing you are most proud of?" }
        ];
        initial.forEach(q => db.ref('questions').push(q));
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openSubMenu(cat) {
        activeCat = cat;
        document.getElementById('sub-title').innerText = cat;
        showScreen('sub-menu');
    }

    function startNewQuestions() {
        showScreen('new-question-screen');
        drawQuestion();
    }

    function drawQuestion() {
        const pool = allQuestions.filter(q => q.cat === activeCat && !answeredIds.includes(q.id));
        if (pool.length === 0) {
            document.getElementById('q-text').innerText = "All caught up!";
            document.getElementById('done-btn').style.display = 'none';
            document.getElementById('q-count').innerText = "0 remaining";
            return;
        }
        currentQ = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('q-text').innerText = currentQ.text;
        document.getElementById('done-btn').style.display = 'block';
        document.getElementById('q-count').innerText = pool.length + " remaining";
    }

    function markDone() {
        if (!currentQ) return;
        answeredIds.push(currentQ.id);
        db.ref('answered').set(answeredIds);
        drawQuestion();
    }

    function addQuestion() {
        const text = document.getElementById('new-q-text').value;
        const cat = document.getElementById('new-q-cat').value;
        if(!text) return;
        db.ref('questions').push({ id: Date.now(), cat: cat, text: text });
        document.getElementById('new-q-text').value = '';
        alert("Saved!");
    }

    function deleteQuestion(fKey) {
        if(confirm("Delete this question?")) {
            db.ref('questions/' + fKey).remove();
        }
    }

    function renderAdminList() {
        const list = document.getElementById('admin-q-list');
        list.innerHTML = allQuestions.map(q => `
            <div class="q-list-item">
                <span>[${q.cat}] ${q.text}</span>
                <button class="btn-danger" onclick="deleteQuestion('${q.firebaseKey}')">🗑️</button>
            </div>
        `).join('');
    }

    function viewAnswered() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';
        const pool = allQuestions.filter(q => q.cat === activeCat && answeredIds.includes(q.id));
        if (pool.length === 0) {
            gallery.innerHTML = '<div class="gallery-item"><div class="card"><h2>None yet!</h2></div></div>';
        } else {
            pool.reverse().forEach(q => {
                gallery.innerHTML += `<div class="gallery-item"><div class="card"><h2>${q.text}</h2></div></div>`;
            });
        }
        showScreen('answered-screen');
    }
</script>
</body>
</html>
